apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel
spec:
  replicas: 3   # 🔥 scaling
  selector:
    matchLabels:
      app: laravel
  template:
    metadata:
      labels:
        app: laravel
    spec:
      containers:
      - name: laravel
        image: laravel-app
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          value: mysql
        - name: DB_DATABASE
          value: laravel
        - name: DB_USERNAME
          value: root
        - name: DB_PASSWORD
          value: root
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: laravel
spec:
  selector:
    app: laravel
  ports:
    - port: 80
      targetPort: 80